<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SuomiChat — WebGPU runtime</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; line-height: 1.45; }
  h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
  .subtitle { color: #666; margin-top: 0; font-size: 0.9rem; }
  pre { background: #f6f6f6; padding: 0.75rem; overflow: auto; font-size: 12px; border-radius: 4px; }
  .ok { color: #228822; }
  .warn { color: #cc7700; }
  .err { color: #cc0000; }
  button { padding: 0.5rem 1rem; cursor: pointer; font-size: 14px; }
  button:disabled { cursor: not-allowed; opacity: 0.6; }
  #status { white-space: pre-line; font-size: 13px; color: #333; min-height: 1em; }
  #chat { margin-top: 1.5rem; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; }
  .msg { margin: 0.5rem 0; }
  .msg.user { color: #335; font-weight: 500; }
  .msg.assistant { color: #1a4; white-space: pre-wrap; }
  .ctrl { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
  select { padding: 0.4rem; font-size: 14px; flex: 1; }
  label { font-size: 13px; color: #555; }
</style>
</head>
<body>

<h1>SuomiChat — d12 SFT runs entirely in your browser via WebGPU</h1>
<p class="subtitle">Personal-learning runtime: 286M params, fp32, no quantisation. ~1.1 GB initial download.</p>

<button id="boot">Load model</button>
<div id="status">Click "Load model" to download weights and warm up GPU.</div>

<div id="chat" hidden>
  <div id="conversation"></div>
  <div class="ctrl">
    <input id="promptIn" type="text" placeholder="Kysy jotain suomeksi…" style="flex:1; padding:0.4rem; font-size:14px">
    <label>Tokens:</label>
    <input id="maxNew" type="number" value="32" min="1" max="128" style="width:5em">
    <button id="send" disabled>Generate</button>
  </div>
  <div class="ctrl" style="margin-top:0.25rem; font-size:12px; color:#666">
    <span>Quick picks:</span>
    <span id="picks"></span>
  </div>
</div>

<script type="module">
import { initWebGPU, loadModel, greedyGenerate } from "./runtime.js";
import { loadTokenizer, decodeTokens, renderForCompletion } from "./tokenizer.js";

// Demo prompts shown as quick picks. Free-text input below.
const DEMO_PROMPTS = [
  "Moi! Kuka olet?",
  "Mikä on Suomen pääkaupunki?",
  "Kerro vitsi.",
];

const statusEl = document.getElementById("status");
const chatEl   = document.getElementById("chat");
const convEl   = document.getElementById("conversation");
const sendBtn  = document.getElementById("send");
const bootBtn  = document.getElementById("boot");
const promptIn = document.getElementById("promptIn");
const picksEl  = document.getElementById("picks");
const maxNewIn = document.getElementById("maxNew");

function log(msg, cls) {
  const line = document.createElement("div");
  line.textContent = msg;
  if (cls) line.className = cls;
  statusEl.appendChild(line);
  console.log(msg);
}

let device, model, tokenizer;

bootBtn.onclick = async () => {
  bootBtn.disabled = true;
  statusEl.textContent = "";
  try {
    log("1/4 init WebGPU…");
    ({ device } = await initWebGPU());
    log("    ✓ device ready", "ok");

    log("2/4 fetch config + tensor manifest…");
    const cfg = await (await fetch("./config.json")).json();
    const manifest = await (await fetch("./tensors.json")).json();
    log(`    ✓ d${cfg.n_layer}  vocab=${cfg.vocab_size}  n_embd=${cfg.n_embd}`, "ok");

    log(`3/4 streaming ${(manifest.total_size / 1024**2).toFixed(0)} MB of weights to GPU…`);
    const t0 = performance.now();
    model = await loadModel(device, cfg, manifest, "./weights.bin");
    log(`    ✓ loaded in ${((performance.now() - t0) / 1000).toFixed(1)} s`, "ok");

    log("4/4 loading tokenizer JSON…");
    tokenizer = await loadTokenizer();
    log(`    ✓ vocab=${tokenizer.nVocab}, ${Object.keys(tokenizer.specialTokens).length} special tokens`, "ok");

    for (const text of DEMO_PROMPTS) {
      const a = document.createElement("a");
      a.href = "#";
      a.textContent = text;
      a.style.marginRight = "0.5rem";
      a.onclick = (ev) => { ev.preventDefault(); promptIn.value = text; };
      picksEl.appendChild(a);
    }
    chatEl.hidden = false;
    sendBtn.disabled = false;
    log("Ready. Pick a prompt below.", "ok");
  } catch (e) {
    log("FAILED: " + (e.message || e), "err");
    console.error(e);
    bootBtn.disabled = false;
  }
};

sendBtn.onclick = async () => {
  const promptText = promptIn.value.trim();
  if (!promptText) return;
  sendBtn.disabled = true;
  const promptIds = renderForCompletion(tokenizer,
    [{ role: "user", content: promptText }]);
  const maxNew = Math.max(1, Math.min(128, parseInt(maxNewIn.value, 10) || 32));

  const userDiv = document.createElement("div");
  userDiv.className = "msg user";
  userDiv.textContent = "User: " + promptText;
  convEl.appendChild(userDiv);

  const aDiv = document.createElement("div");
  aDiv.className = "msg assistant";
  aDiv.textContent = "Assistant (generating " + maxNew + " tokens, ~" + maxNew + "s)…";
  convEl.appendChild(aDiv);

  try {
    const t0 = performance.now();
    const all = await greedyGenerate(device, model, promptIds, maxNew, promptIds.length + maxNew + 4);
    const dt = ((performance.now() - t0) / 1000).toFixed(1);
    const generatedIds = all.slice(promptIds.length);
    // Stop at assistant_end if present
    const endId = tokenizer.specialTokens["<|assistant_end|>"];
    let cut = generatedIds.indexOf(endId);
    if (cut === -1) cut = generatedIds.length;
    const text = decodeTokens(tokenizer, generatedIds.slice(0, cut), { skipSpecial: true });
    aDiv.textContent = "Assistant: " + text + "\n\n[" + cut + " tokens in " + dt + "s]";
  } catch (e) {
    aDiv.textContent = "FAILED: " + (e.message || e);
    aDiv.className = "msg err";
    console.error(e);
  } finally {
    sendBtn.disabled = false;
  }
};
</script>

</body>
</html>
