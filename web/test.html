<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SuomiChat WebGPU runtime — test harness</title>
</head>
<body>

<h1>Test harness</h1>
<p>This page is loaded by <code>test_runtime.py</code> via Playwright.
It loads the model once, then exposes <code>window.run(op, args)</code>
which the Python driver invokes.</p>

<pre id="status">Initialising…</pre>

<script type="module">
import { initWebGPU, loadModel, embeddingLookup, rmsnorm, matmul, linear,
         add, mul, scalarMul, relu2, sigmoid, ropeApply, mlpBlock,
         attentionBlock, transformerBlock, forward, softmax,
         initKVCache, destroyKVCache, greedyGenerate,
         forwardT, releaseTensor, _forward_legacy,
         allocTensor, uploadTensor, downloadTensor,
         softmaxT, beginSession, forwardBatchT } from "./runtime.js";
import { loadTokenizer, decodeTokens, encodeOrdinary, renderForCompletion } from "./tokenizer.js";

const status = document.getElementById("status");

(async () => {
  try {
    status.textContent = "Initialising WebGPU…";
    const { device } = await initWebGPU();
    status.textContent += "\nFetching config + manifest…";
    const config = await (await fetch("./config.json")).json();
    const manifest = await (await fetch("./tensors.json")).json();
    status.textContent += `\nLoading ${(manifest.total_size / 1024**2).toFixed(0)} MB of weights…`;
    const model = await loadModel(device, config, manifest, "./weights.bin");
    status.textContent += "\n✓ ready";

    // Exposed to Python via page.evaluate
    window.run = async (op, args) => {
      switch (op) {
        case "embedding": {
          const result = await embeddingLookup(device, model, args.tokenId);
          return Array.from(result);   // Float32Array → plain Array for JSON
        }
        case "rmsnorm": {
          const input = new Float32Array(args.input);
          const eps = args.eps ?? 1e-5;
          const result = await rmsnorm(device, model, input, eps);
          return Array.from(result);
        }
        case "matmul": {
          const a = new Float32Array(args.a);
          const b = new Float32Array(args.b);
          const result = await matmul(device, model, a, args.aShape, b, args.bShape);
          return Array.from(result);
        }
        case "add": {
          const r = await add(device, model, new Float32Array(args.a), new Float32Array(args.b));
          return Array.from(r);
        }
        case "mul": {
          const r = await mul(device, model, new Float32Array(args.a), new Float32Array(args.b));
          return Array.from(r);
        }
        case "scalar_mul": {
          const r = await scalarMul(device, model, new Float32Array(args.a), args.alpha);
          return Array.from(r);
        }
        case "relu2": {
          const r = await relu2(device, model, new Float32Array(args.a));
          return Array.from(r);
        }
        case "sigmoid": {
          const r = await sigmoid(device, model, new Float32Array(args.a));
          return Array.from(r);
        }
        case "sdpa_t": {
          // Direct exercise of T>1 SDPA pipeline. Writes K, V into a tiny
          // cache buffer (just T positions, no T0 offset) then runs the
          // sdpa_scores → softmax → sdpa_output chain.
          const { T, nH, nKV, hd } = args;
          const Tk = T;
          // Build buffers
          const qT = uploadTensor(device, model, new Float32Array(args.q), [T, nH, hd], "sdpa_q");
          const kBuf = device.createBuffer({ size: Tk * nKV * hd * 4,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC });
          const vBuf = device.createBuffer({ size: Tk * nKV * hd * 4,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC });
          device.queue.writeBuffer(kBuf, 0, new Float32Array(args.k));
          device.queue.writeBuffer(vBuf, 0, new Float32Array(args.v));
          // Build a fake "tensor" wrapper for the cache buffers
          const kTensor = { buffer: kBuf, byteLength: Tk*nKV*hd*4, _pooled: false };
          const vTensor = { buffer: vBuf, byteLength: Tk*nKV*hd*4, _pooled: false };

          // Helper to run a single dispatch via the runtime's primitives —
          // but the SDPA shaders aren't exported. Reach in via the lower
          // level: get the pipelines and dispatch ourselves.
          const scoresPipe = await (async () => {
            const r = await fetch("./shaders/sdpa_scores.wgsl");
            return device.createComputePipeline({
              layout: "auto",
              compute: { module: device.createShaderModule({ code: await r.text() }), entryPoint: "main" }
            });
          })();
          const outputPipe = await (async () => {
            const r = await fetch("./shaders/sdpa_output.wgsl");
            return device.createComputePipeline({
              layout: "auto",
              compute: { module: device.createShaderModule({ code: await r.text() }), entryPoint: "main" }
            });
          })();
          const softmaxPipe = await (async () => {
            const r = await fetch("./shaders/softmax.wgsl");
            return device.createComputePipeline({
              layout: "auto",
              compute: { module: device.createShaderModule({ code: await r.text() }), entryPoint: "main" }
            });
          })();

          // scores buffer
          const scoresBuf = device.createBuffer({ size: T*nH*Tk*4,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC });
          // output buffer
          const outBuf = device.createBuffer({ size: T*nH*hd*4,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC });

          // sdpa_scores uniforms: nH, nKV, hd, Tk, T, T0=0, scale@24
          const ub1 = new ArrayBuffer(32);
          new Uint32Array(ub1).set([nH, nKV, hd, Tk, T, 0]);
          new DataView(ub1).setFloat32(24, 1.0/Math.sqrt(hd), true);
          const u1 = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
          device.queue.writeBuffer(u1, 0, ub1);

          let enc = device.createCommandEncoder();
          let pass = enc.beginComputePass();
          pass.setPipeline(scoresPipe);
          pass.setBindGroup(0, device.createBindGroup({
            layout: scoresPipe.getBindGroupLayout(0),
            entries: [
              { binding: 0, resource: { buffer: qT.buffer } },
              { binding: 1, resource: { buffer: kBuf } },
              { binding: 2, resource: { buffer: scoresBuf } },
              { binding: 3, resource: { buffer: u1 } },
            ],
          }));
          pass.dispatchWorkgroups(Math.ceil(T*nH/8), Math.ceil(Tk/8));
          pass.end();
          device.queue.submit([enc.finish()]);

          // softmax: rows = T*nH, n = Tk
          const scoresTensor = { buffer: scoresBuf, byteLength: T*nH*Tk*4, _pooled: false, shape: [T*nH, Tk] };
          const attnT = await softmaxT(device, model, scoresTensor, T*nH, Tk);

          // sdpa_output uniforms: nH, nKV, hd, Tk, T
          const ub2 = new ArrayBuffer(32);
          new Uint32Array(ub2).set([nH, nKV, hd, Tk, T]);
          const u2 = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
          device.queue.writeBuffer(u2, 0, ub2);

          enc = device.createCommandEncoder();
          pass = enc.beginComputePass();
          pass.setPipeline(outputPipe);
          pass.setBindGroup(0, device.createBindGroup({
            layout: outputPipe.getBindGroupLayout(0),
            entries: [
              { binding: 0, resource: { buffer: attnT.buffer } },
              { binding: 1, resource: { buffer: vBuf } },
              { binding: 2, resource: { buffer: outBuf } },
              { binding: 3, resource: { buffer: u2 } },
            ],
          }));
          pass.dispatchWorkgroups(Math.ceil(T*nH/8), Math.ceil(hd/8));
          pass.end();
          device.queue.submit([enc.finish()]);

          // Download
          const outTensor = { buffer: outBuf, byteLength: T*nH*hd*4, _pooled: false };
          const out = await downloadTensor(device, outTensor);
          // Cleanup
          kBuf.destroy(); vBuf.destroy(); scoresBuf.destroy(); outBuf.destroy(); u1.destroy(); u2.destroy();
          releaseTensor(model, qT); releaseTensor(model, attnT);
          return Array.from(out);
        }
        case "rope": {
          const r = await ropeApply(device, model, new Float32Array(args.x), args.N, args.D, args.T0, args.H);
          return Array.from(r);
        }
        case "linear": {
          const r = await linear(device, model, new Float32Array(args.x), args.M, args.K, args.weightName);
          return Array.from(r);
        }
        case "mlp": {
          const r = await mlpBlock(device, model, args.layerIdx, new Float32Array(args.x));
          return Array.from(r);
        }
        case "attention": {
          const ve = args.ve ? new Float32Array(args.ve) : null;
          const r = await attentionBlock(device, model, args.layerIdx,
                                          new Float32Array(args.x), args.T0 ?? 0, ve);
          return Array.from(r);
        }
        case "block": {
          const ve = args.ve ? new Float32Array(args.ve) : null;
          const r = await transformerBlock(device, model, args.layerIdx,
                                            new Float32Array(args.x), new Float32Array(args.x0),
                                            args.T0 ?? 0, ve);
          return Array.from(r);
        }
        case "full_forward": {
          const r = await forward(device, model, args.tokenId);
          return Array.from(r);
        }
        case "softmax": {
          const r = await softmax(device, model, new Float32Array(args.x), args.rows, args.n);
          return Array.from(r);
        }
        case "tokenizer_decode": {
          // ids (array of int) → string. Loads tokenizer JSON on first call.
          if (!window._tok) window._tok = await loadTokenizer();
          return decodeTokens(window._tok, args.ids, { skipSpecial: !!args.skipSpecial });
        }
        case "tokenizer_encode": {
          if (!window._tok) window._tok = await loadTokenizer();
          return encodeOrdinary(window._tok, args.text);
        }
        case "tokenizer_render": {
          if (!window._tok) window._tok = await loadTokenizer();
          return renderForCompletion(window._tok, args.messages);
        }
        case "greedy_generate": {
          // promptTokens (array of int), maxNew (int) → full token list.
          return await greedyGenerate(device, model, args.promptTokens, args.maxNew, args.maxSeqLen);
        }
        case "bench_prefill": {
          // Compare forwardBatchT(N tokens) vs N separate forwardT calls.
          // Returns ms for both + speedup.
          const N = args.N ?? 8;
          const tokenIds = Array.from({length: N}, (_, i) => 100 + i);
          // Warmup
          {
            const c = initKVCache(device, model, N + 4);
            const r = await forwardBatchT(device, model, tokenIds, c);
            releaseTensor(model, r); destroyKVCache(c);
          }
          await device.queue.onSubmittedWorkDone();
          // Bench batched
          const tBatch0 = performance.now();
          for (let it = 0; it < (args.iters ?? 10); it++) {
            const c = initKVCache(device, model, N + 4);
            const r = await forwardBatchT(device, model, tokenIds, c);
            releaseTensor(model, r); destroyKVCache(c);
          }
          await device.queue.onSubmittedWorkDone();
          const dtBatch = performance.now() - tBatch0;
          // Bench unbatched (N forwardT calls per iter)
          const tStep0 = performance.now();
          for (let it = 0; it < (args.iters ?? 10); it++) {
            const c = initKVCache(device, model, N + 4);
            for (const tok of tokenIds) {
              const r = await forwardT(device, model, tok, c);
              releaseTensor(model, r);
            }
            destroyKVCache(c);
          }
          await device.queue.onSubmittedWorkDone();
          const dtStep = performance.now() - tStep0;
          return {
            N, iters: args.iters ?? 10,
            batch_total_ms: dtBatch,
            stepwise_total_ms: dtStep,
            batch_per_iter_ms: dtBatch / (args.iters ?? 10),
            stepwise_per_iter_ms: dtStep / (args.iters ?? 10),
            speedup: dtStep / dtBatch,
          };
        }
        case "bench_forward": {
          // Measure ms/token for the GPU-only forwardT path vs the
          // legacy Float32Array round-tripping forward. Returns total
          // wall-clock for N iterations + the per-token average.
          const N = args.N ?? 50;
          const tokenId = args.tokenId ?? 100;
          const useLegacy = !!args.legacy;
          const cache = initKVCache(device, model, N + 8);
          // warmup (compiles pipelines, fills pool)
          if (useLegacy) {
            await _forward_legacy(device, model, tokenId, cache);
          } else {
            const t = await forwardT(device, model, tokenId, cache);
            releaseTensor(model, t);
          }
          await device.queue.onSubmittedWorkDone();
          const t0 = performance.now();
          for (let i = 0; i < N; i++) {
            if (useLegacy) {
              await _forward_legacy(device, model, tokenId, cache);
            } else {
              const t = await forwardT(device, model, tokenId, cache);
              releaseTensor(model, t);
            }
          }
          await device.queue.onSubmittedWorkDone();
          const dt = performance.now() - t0;
          destroyKVCache(cache);
          return { ms: dt, N, msPerToken: dt / N, legacy: useLegacy };
        }
        case "forward_batch": {
          // Process T tokens in one prefill call, return last-position logits.
          const cache = initKVCache(device, model, args.tokenIds.length + 4);
          const logitsT = await forwardBatchT(device, model, args.tokenIds, cache);
          const all = await downloadTensor(device, logitsT);
          releaseTensor(model, logitsT);
          destroyKVCache(cache);
          const T = args.tokenIds.length;
          const V = model.config.vocab_size;
          // Return last row only
          return Array.from(all.slice((T - 1) * V, T * V));
        }
        case "two_tokens": {
          // Run forward(t0, cache) then forward(t1, cache); return final logits.
          // Exercises KV cache + smear (smear fires on the 2nd call).
          const cache = initKVCache(device, model, args.maxSeqLen ?? 32);
          await forward(device, model, args.t0, cache);
          const r = await forward(device, model, args.t1, cache);
          destroyKVCache(cache);
          return Array.from(r);
        }
        default:
          throw new Error("unknown op: " + op);
      }
    };

    window.runtimeReady = true;
  } catch (e) {
    status.textContent = "FAILED: " + (e.message || e);
    console.error(e);
    window.runtimeError = e.message || String(e);
  }
})();
</script>

</body>
</html>
